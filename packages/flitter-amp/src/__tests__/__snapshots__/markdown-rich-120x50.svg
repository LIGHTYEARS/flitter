<text x="54" y="386.04" style="fill:#2ba12b;font-style:italic" xml:space="preserve">Explain the API response format</text>
<text x="1011.6" y="386.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="1011.6" y="404.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="422.04" style="fill:#969896;font-weight:bold" xml:space="preserve">─ API Response Format</text>
<text x="1011.6" y="422.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="440.04" style="fill:#dcdcdc" xml:space="preserve">All endpoints return a </text>
<text x="222" y="440.04" style="fill:#dcdcdc;font-weight:bold" xml:space="preserve">standardized</text>
<text x="322.8" y="440.04" style="fill:#dcdcdc" xml:space="preserve"> JSON response:</text>
<text x="1011.6" y="440.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="458.04" style="fill:#dcdcdc" xml:space="preserve">interface ApiResponse&lt;T&gt; {</text>
<text x="1011.6" y="458.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="476.04" style="fill:#dcdcdc" xml:space="preserve">  success: boolean;</text>
<text x="1011.6" y="476.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="494.04" style="fill:#dcdcdc" xml:space="preserve">  data?: T;</text>
<text x="1011.6" y="494.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="512.04" style="fill:#dcdcdc" xml:space="preserve">  error?: {</text>
<text x="1011.6" y="512.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="530.04" style="fill:#dcdcdc" xml:space="preserve">    code: string;</text>
<text x="1011.6" y="530.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="548.04" style="fill:#dcdcdc" xml:space="preserve">    message: string;</text>
<text x="1011.6" y="548.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="566.04" style="fill:#dcdcdc" xml:space="preserve">  };</text>
<text x="1011.6" y="566.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="584.04" style="fill:#dcdcdc" xml:space="preserve">}</text>
<text x="1011.6" y="584.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="602.04" style="fill:#61afef;font-weight:bold" xml:space="preserve">· Status Codes</text>
<text x="1011.6" y="602.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="331.2" y="620.04" style="fill:#61afef;font-weight:bold" xml:space="preserve">  Code │ Meaning      │ Use case          </text>
<text x="1011.6" y="620.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="331.2" y="638.04" style="fill:#969896" xml:space="preserve">  ─────┼──────────────┼───────────────────</text>
<text x="1011.6" y="638.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="331.2" y="656.04" style="fill:#dcdcdc" xml:space="preserve">  200  │ OK           │ Successful GET/PUT</text>
<text x="1011.6" y="656.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="331.2" y="674.04" style="fill:#dcdcdc" xml:space="preserve">  201  │ Created      │ Successful POST   </text>
<text x="1011.6" y="674.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="331.2" y="692.04" style="fill:#dcdcdc" xml:space="preserve">  400  │ Bad Request  │ Validation error  </text>
<text x="1011.6" y="692.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="331.2" y="710.04" style="fill:#dcdcdc" xml:space="preserve">  401  │ Unauthorized │ Missing auth      </text>
<text x="1011.6" y="710.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="331.2" y="728.04" style="fill:#dcdcdc" xml:space="preserve">  500  │ Server Error │ Internal error    </text>
<text x="1011.6" y="728.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="746.04" style="fill:#61afef;font-weight:bold" xml:space="preserve">· Error Handling</text>
<text x="1011.6" y="746.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="764.04" style="fill:#dcdcdc" xml:space="preserve">Nested error categories:</text>
<text x="1011.6" y="764.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="782.04" style="fill:#969696" xml:space="preserve">  • </text>
<text x="62.400000000000006" y="782.04" style="fill:#dcdcdc;font-weight:bold" xml:space="preserve">Client errors</text>
<text x="171.6" y="782.04" style="fill:#dcdcdc" xml:space="preserve"> (4xx)</text>
<text x="1011.6" y="782.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="800.04" style="fill:#dcdcdc" xml:space="preserve">  - Validation failures   - Authentication issues   - Rate limiting</text>
<text x="1011.6" y="800.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="818.04" style="fill:#969696" xml:space="preserve">  • </text>
<text x="62.400000000000006" y="818.04" style="fill:#dcdcdc;font-weight:bold" xml:space="preserve">Server errors</text>
<text x="171.6" y="818.04" style="fill:#dcdcdc" xml:space="preserve"> (5xx)</text>
<text x="1011.6" y="818.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="836.04" style="fill:#dcdcdc" xml:space="preserve">  - Database timeouts   - External service failures</text>
<text x="1011.6" y="836.04" style="fill:#969896" xml:space="preserve">░</text>
