<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>xterm.js Golden Viewer</title>
<link rel="stylesheet" href="@xterm/xterm/css/xterm.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0d1117; overflow: hidden; }
  #terminal { position: absolute; top: 0; left: 0; }
</style>
</head>
<body>
<div id="terminal"></div>
<script type="module">
import { Terminal } from '@xterm/xterm';
import { CanvasAddon } from '@xterm/addon-canvas';
import { Unicode11Addon } from '@xterm/addon-unicode11';

const params = new URLSearchParams(location.search);
const file = params.get('file');
const cols = parseInt(params.get('cols') || '244', 10);
const rows = parseInt(params.get('rows') || '63', 10);

if (!file) {
  document.body.innerText = 'Missing ?file= parameter';
  throw new Error('Missing ?file= parameter');
}

const terminal = new Terminal({
  cols,
  rows,
  convertEol: true,
  allowProposedApi: true,
  fontFamily: '"Berkeley Mono", "JetBrains Mono", "Fira Code", "SF Mono", "Menlo", monospace',
  fontSize: 14,
  lineHeight: 1.0,
  theme: {
    background: '#0d1117',
    foreground: '#e6edf3',
    cursor: '#0d1117',
    cursorAccent: '#0d1117',
    selectionBackground: '#264f78',
    black: '#484f58',
    red: '#ff7b72',
    green: '#3fb950',
    yellow: '#d29922',
    blue: '#58a6ff',
    magenta: '#bc8cff',
    cyan: '#39c5cf',
    white: '#b1bac4',
    brightBlack: '#6e7681',
    brightRed: '#ffa198',
    brightGreen: '#56d364',
    brightYellow: '#e3b341',
    brightBlue: '#79c0ff',
    brightMagenta: '#d2a8ff',
    brightCyan: '#56d4dd',
    brightWhite: '#f0f6fc',
  },
});

const unicode11Addon = new Unicode11Addon();
terminal.loadAddon(unicode11Addon);
terminal.unicode.activeVersion = '11';

terminal.open(document.getElementById('terminal'));

const canvasAddon = new CanvasAddon();
terminal.loadAddon(canvasAddon);

const resp = await fetch(file);
const ansiData = await resp.text();

terminal.write(ansiData, () => {
  window.__XTERM_READY = true;
});
</script>
</body>
</html>
